<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trocas e Devoluções – Serentti</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Jost&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --accent: #1a1a1a;
      --text: #222;
      --text-dim: #777;
      --border: rgba(0,0,0,0.06);
    }

    body {
      font-family: 'Jost', sans-serif;
      background: #ffffff;
      color: var(--text);
      padding: 120px 24px 60px;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 48px;
      background: rgba(255,255,255,0.98);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      letter-spacing: 0.15em;
      text-decoration: none;
      color: var(--accent);
      display: flex;
      flex-direction: column;
    }

    .logo span {
      font-size: 0.55rem;
      letter-spacing: 0.4em;
      color: var(--text-dim);
    }

    nav { display: flex; gap: 40px; }
    nav a {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--text-dim);
    }

    .container { max-width: 600px; margin: auto; }
    h1 { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 2.5rem; margin-bottom: 20px; }
    .desc { color: var(--text-dim); margin-bottom: 40px; }

    .field { margin-bottom: 20px; display: flex; flex-direction: column; }
    .field label { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 6px; color: var(--text-dim); }
    .field input, .field textarea { border: 1px solid #ddd; padding: 12px; font-family: 'Jost'; outline: none; transition: 0.3s; }
    .field input:focus, .field textarea:focus { border-color: var(--accent); }

    .btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 14px;
      width: 100%;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover { opacity: 0.85; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }

    .back { display: inline-block; margin-bottom: 30px; text-decoration: none; color: var(--text-dim); font-size: 0.8rem; }

    /* Estilo do Toast de Sucesso */
    #status-msg {
      display: none;
      margin-top: 20px;
      padding: 15px;
      text-align: center;
      font-size: 0.9rem;
      border-radius: 2px;
    }
    .msg-success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }

    @media (max-width: 768px) {
      header { padding: 15px 24px; }
      nav { display: none; }
    }
  </style>
</head>

<body>

  <header>
    <a href="./" class="logo">Serentti<span>Minimal Jewelry</span></a>
    <nav>
      <a href="./#produtos">Coleção</a>
      <a href="./#sobre">Nossa Essência</a>
    </nav>
  </header>

  <div class="container">
    <a href="./" class="back">← Voltar para loja</a>

    <h1>Trocas & Devoluções</h1>
    <p class="desc">Preencha os dados abaixo e nossa equipe entrará em contacto o mais breve possível.</p>

    <form id="devolucaoForm">
      <div class="field">
        <label>Nome completo</label>
        <input type="text" name="nome" required>
      </div>

      <div class="field">
        <label>E-mail</label>
        <input type="email" name="email" required>
      </div>

      <div class="field">
        <label>Número do pedido</label>
        <input type="text" name="pedido" placeholder="Ex: #1234" required>
      </div>

      <div class="field">
        <label>Motivo</label>
        <textarea name="motivo" rows="4" required placeholder="Conte-nos o que aconteceu..."></textarea>
      </div>

      <button type="submit" class="btn" id="btnEnviar">Enviar Solicitação</button>
    </form>

    <div id="status-msg"></div>
  </div>

  <script>
    const form = document.getElementById('devolucaoForm');
    const btn = document.getElementById('btnEnviar');
    const statusMsg = document.getElementById('status-msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Feedback visual de carregamento
      btn.disabled = true;
      btn.innerText = "Enviando...";

      const formData = {
        nome: form.nome.value,
        email: form.email.value,
        pedido: form.pedido.value,
        motivo: form.motivo.value
      };

      try {
        const response = await fetch('https://serentti-backend.onrender.com/solicitar-devolucao', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });

        if (response.ok) {
          // Sucesso
          form.reset();
          statusMsg.innerText = "Solicitação enviada com sucesso! Verifique o seu e-mail.";
          statusMsg.className = "msg-success";
          statusMsg.style.display = "block";
          btn.innerText = "Solicitação Enviada";
        } else {
          throw new Error('Erro no servidor');
        }
      } catch (error) {
        alert("Ocorreu um erro ao enviar. Por favor, tente novamente mais tarde.");
        btn.disabled = false;
        btn.innerText = "Enviar Solicitação";
      }
    });
  </script>

</body>
</html>
